version: "3.9"

services:
  db:
    image: postgres:16
    container_name: flour_and_fire_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: flour_and_fire
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flour_and_fire"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flour_and_fire_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: flour_and_fire
      DB_USER: postgres
      DB_PASSWORD: postgres
      AUTO_MIGRATE: "1"
      AUTO_SEED: "1"
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: Admin123!
      ADMIN_FIRST_NAME: Admin
      ADMIN_LAST_NAME: User
    ports:
      - "10001:80"
    volumes:
      - .:/var/www/html

volumes:
  postgres_data:
